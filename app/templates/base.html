<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0c0b0d">
  <title>{% block title %}Compare Plex Watchlists With Friends · Plex Watchlist Matcher{% endblock %}</title>
  <meta name="description" content="{% block description %}Compare Plex watchlists with friends and instantly see the movies and shows everyone wants to watch. Free, no install — sign in with Plex and share one link.{% endblock %}">
  <meta name="robots" content="{% block robots %}index, follow{% endblock %}">
  <link rel="canonical" href="{{ BASE_URL }}{{ request.url.path }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ SITE_NAME }}">
  <meta property="og:title" content="{{ self.title() }}">
  <meta property="og:description" content="{{ self.description() }}">
  <meta property="og:url" content="{{ BASE_URL }}{{ request.url.path }}">
  <meta property="og:image" content="{{ BASE_URL }}/static/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Plex Watchlist Matcher — compare Plex watchlists with friends">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ self.title() }}">
  <meta name="twitter:description" content="{{ self.description() }}">
  <meta name="twitter:image" content="{{ BASE_URL }}/static/og-image.png">

  <!-- Icons / manifest -->
  <link rel="icon" href="/static/newlogo.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/static/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/static/app.css">
  <script>window.PLEX_APP = { product: "{{ APP_PRODUCT }}", version: "{{ APP_VERSION }}" };</script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="/static/app.js" defer></script>
  <script src="/static/plex-client.js" defer></script>
  {% block head_extra %}{% endblock %}
</head>
<body hx-boost="true">
  <header class="site-header">
    <a href="/" hx-boost="false"><img class="brand-mark" src="/static/newlogo.svg" alt="" aria-hidden="true" width="28" height="28"><span class="brand-word">Plex Watchlist Matcher</span></a>
    <nav class="site-nav"><a href="/about">About</a></nav>
  </header>
  <main id="app">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
