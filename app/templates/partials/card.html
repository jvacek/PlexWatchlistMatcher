<figure class="card" data-type="{{ r.item.type }}">
  {% if r.item.thumb %}
    <img src="/img?room={{ slug }}&src={{ r.item.thumb | urlencode }}"
         alt="{{ r.item.title }}" loading="lazy">
  {% else %}
    <div class="noposter">No poster</div>
  {% endif %}
  <figcaption>
    <strong>{{ r.item.title }}</strong>{% if r.item.year %} ({{ r.item.year }}){% endif %}
    {% if r.count %}
      <div class="who">
        {% for w in r.who_people %}
          {% if w.thumb %}
            <img class="avatar" src="/img?room={{ slug }}&src={{ w.thumb | urlencode }}"
                 alt="{{ w.username }}" title="{{ w.username }}" loading="lazy">
          {% endif %}
        {% endfor %}
        <small>{{ r.count }}/{{ r.total }}</small>
      </div>
    {% endif %}
  </figcaption>
</figure>
