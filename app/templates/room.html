{% extends "base.html" %}
{% block content %}
<div id="room"
     data-filter="all"
     hx-get="/room/{{ slug }}/status"
     hx-trigger="load, every 3s"
     hx-include="#sig"
     hx-swap="innerHTML">
  <div class="skel-wrap" aria-hidden="true">
    <div class="skel-row"><div class="skel skel-poster"></div>
      <div class="skel-lines">
        <div class="skel skel-line w-60"></div>
        <div class="skel skel-line w-40"></div>
        <div class="skel skel-line w-90"></div>
      </div>
    </div>
    <div class="skel-row"><div class="skel skel-poster"></div>
      <div class="skel-lines">
        <div class="skel skel-line w-40"></div>
        <div class="skel skel-line w-60"></div>
        <div class="skel skel-line w-90"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
